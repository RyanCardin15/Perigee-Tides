name: Bug report
description: A defect or regression in the NOAA MCP server.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed Behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Logs, MCP requests, responses, NOAA examples, or failing test output.
    validations:
      required: false
